<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Wildberries</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a1040 45%, #2d1b69 100%);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px 44px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            border-radius: 100%;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header .logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(145deg, #8e24aa, #6a1b9a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
        }
        .header .badge {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 4px;
            font-weight: 400;
        }
        .pass-info {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-weight: 400;
        }
        .pass-info strong {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }
        .user-form {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .user-form label {
            font-weight: 500;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 36px;
        }
        .user-form input {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            transition: 0.3s;
        }
        .user-form input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .user-form input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 4px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .progress-container {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            height: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8e24aa, #b388d6);
            border-radius: 20px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: -14px;
            margin-bottom: 16px;
            font-weight: 400;
        }
        .question {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 22px;
            margin-bottom: 14px;
            border-radius: 16px;
            border-left: 3px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }
        .question.correct {
            border-left-color: #28a745;
            background: rgba(40, 167, 69, 0.06);
        }
        .question.wrong {
            border-left-color: #dc3545;
            background: rgba(220, 53, 69, 0.06);
        }
        .question-title {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
        }
        .question .q-number {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
            font-size: 13px;
        }
        .options label {
            display: block;
            padding: 6px 0 6px 30px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s;
            position: relative;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
        }
        .options label:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .options input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.1);
            position: absolute;
            left: 0;
            top: 7px;
            accent-color: #8e24aa;
        }
        .options input[type="radio"]:disabled {
            cursor: not-allowed;
        }
        .options label.correct-answer {
            background: rgba(40, 167, 69, 0.12) !important;
            border-radius: 8px;
            color: #28a745;
        }
        .options label.wrong-answer {
            background: rgba(220, 53, 69, 0.12) !important;
            border-radius: 8px;
            color: #dc3545;
        }
        .feedback {
            font-weight: 500;
            font-size: 13px;
            margin-top: 6px;
        }
        .feedback.correct {
            color: #28a745;
        }
        .feedback.wrong {
            color: #dc3545;
        }
        .result-block {
            margin-top: 28px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
        }
        .fio-display {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: inline-block;
        }
        .result-block .score {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
        }
        .result-block .detail {
            font-size: 16px;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        .result-block .pass-status {
            font-size: 20px;
            font-weight: 600;
            margin-top: 10px;
            padding: 10px;
            border-radius: 12px;
        }
        .result-block .pass-status.pass {
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }
        .result-block .pass-status.fail {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }
        .result-block .motivation {
            font-size: 16px;
            margin-top: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-weight: 400;
        }
        .result-block .send-status {
            font-size: 14px;
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }
        .result-block .send-status.success {
            color: #28a745;
            background: rgba(40, 167, 69, 0.08);
            display: inline-block;
        }
        .result-block .send-status.error {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.08);
            display: inline-block;
        }
        .result-block .screenshot-note {
            margin-top: 16px;
            padding: 14px;
            background: rgba(255, 193, 7, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #ffc107;
        }
        .result-block .screenshot-note span {
            font-size: 24px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            min-width: 180px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Inter', sans-serif;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(145deg, #8e24aa, #6a1b9a);
            color: #ffffff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(142, 36, 170, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateY(-2px);
        }
        .btn-home {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 0.5;
            min-width: 120px;
        }
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .container { padding: 20px 18px; border-radius: 24px; }
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header h1 { font-size: 20px; }
            .user-form { flex-direction: column; align-items: stretch; }
            .user-form input { width: 100%; }
            .btn-group { flex-direction: column; }
            .btn { min-width: unset; }
            .btn-home { flex: 1; }
            .question { padding: 14px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="logo">WB</div>
            <h1>Wildberries</h1>
        </div>
        <span class="badge">Тестирование</span>
    </div>
    <div class="subtitle">23 вопроса · 85% для прохождения</div>
    <div class="pass-info">Для успешного прохождения необходимо набрать <strong>85%</strong></div>

    <div class="user-form" id="userForm">
        <label>ФИО</label>
        <input type="text" id="fio" placeholder="Иванов Иван Иванович">
    </div>
    <div class="error-msg" id="userError">⚠️ Введите ФИО перед проверкой</div>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 из 23</div>

    <div id="questions"></div>

    <div class="result-block" id="resultBlock">
        <div class="fio-display" id="fioDisplay"></div>
        <div class="score" id="scoreDisplay">0 / 23</div>
        <div class="detail" id="detailDisplay"></div>
        <div class="pass-status" id="passStatus"></div>
        <div class="motivation" id="motivationText"></div>
        <div class="send-status" id="sendStatus"></div>
        <div class="screenshot-note" id="screenshotNote">
            <span>📸</span> Сделайте скриншот и отправьте руководителю<br>для подтверждения прохождения теста
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="checkBtn">✅ Проверить ответы</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 Пройти заново</button>
        <a href="index.html" class="btn btn-home">🏠 На главную</a>
    </div>
    <div class="footer">При ошибке правильный вариант не показывается</div>
</div>

<script>
(function() {
    const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyhMhW5eaVjFVWUb1Q9eFyhmXWfty_q4UF3HTFaW7f7OsfLGYiVXVYfHppO-eJXHzhIXg/exec';

    function sendToGoogleSheets(fio, testName, correct, total, pct, status) {
        const data = { fio, test: testName, result: correct + ' из ' + total, percent: pct, status };
        console.log('📤 Отправка данных в Google Sheets:', data);
        fetch(GOOGLE_SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            console.log('✅ Запрос отправлен (no-cors)');
            document.getElementById('sendStatus').textContent = '✅ Результат отправлен в таблицу!';
            document.getElementById('sendStatus').className = 'send-status success';
        })
        .catch(error => {
            console.error('❌ Ошибка отправки:', error);
            document.getElementById('sendStatus').textContent = '❌ Ошибка отправки. Проверьте интернет.';
            document.getElementById('sendStatus').className = 'send-status error';
        });
    }

    const rawQuestions = [
        {q:'Что необходимо сделать при выдаче заказа курьеру, если у товара обнаружен брак?', opts:['Отказать курьеру в выдаче заказа и отправить товар на склад','Выдать заказ курьеру, предварительно показав дефект на камеру через терминал','Отменить выдачу и сразу оформить возврат товара','Завернуть товар в дополнительную упаковку и выдать курьеру без отметки'], ans:1},
        {q:'Какой алгоритм действий при приемке товаров поставщика в десктоп-приложении?', opts:['Перейти в раздел «Выдача», отсканировать QR-код поставщика, выдать товары','Перейти в раздел «Приемка», отсканировать стикеры товаров, товарам присвоится ячейка','Перейти в раздел «Возврат», создать коробку и положить туда товары','Отсканировать QR-код поставщика и передать товары курьеру'], ans:1},
        {q:'При выдаче заказа клиенту (не курьеру), что делать, если при вскрытии упаковки до примерки обнаружен дефект?', opts:['Выдать товар, так как дефект не влияет на использование','Снять товар с выдачи (убрать галочку), нажать кнопку «Отметить брак» и подтвердить действие','Выдать товар, но предложить скидку от ПВЗ','Отправить клиента в службу поддержки для оформления возврата'], ans:1},
        {q:'Для выдачи товаров поставщику в десктоп-приложении необходимо:', opts:['Отсканировать штрих-код на каждом товаре для проверки, а затем QR-код поставщика','Сначала отсканировать QR-код поставщика из его ЛК, затем отсканировать товары по одному (или пропустить сканирование)','Только отсканировать QR-код поставщика, товары выдаются автоматически','Сверить количество товаров в ячейке, не сканируя стикеры'], ans:1},
        {q:'Что делать, если в процессе сборки курьерского заказа сотрудник не нашел товар?', opts:['Отложить сборку до прихода курьера','Нажать кнопку «Не найден» в карточке товара','Закрыть сборку и сообщить о проблеме в техподдержку','Взять аналогичный товар с полки, отсканировать его и выдать'], ans:1},
        {q:'При приемке доставки WB Track от клиента, если сейф-пакет не подходит по размеру, что нужно сделать?', opts:['Предложить клиенту другой размер пакета из имеющихся в ПВЗ','Попросить клиента переоформить доставку с нужным размером пакета','Упаковать доставку в любой подходящий пакет без изменения заявки','Отказать в приеме доставки'], ans:1},
        {q:'В каких случаях допускается использование старого упаковочного пакета вместе с новой упаковкой?', opts:['Всегда, если пакет визуально целый','Если на пакете указаны характеристики товара, имеется «Честный знак» или баркод, либо пакет брендированный','Только для обувных коробок','Использовать старый пакет запрещено всегда'], ans:1},
        {q:'Сколько фотографий необходимо приложить при заполнении формы отметки о браке?', opts:['Одну','Две','Три','Четыре'], ans:3},
        {q:'Можно ли поставить отметку о браке при возврате товара, если ПВЗ не подключен к подготовке товаров к отправке на склад?', opts:['Да, всегда','Нет, только если ПВЗ подключен к подготовке товаров к отправке на склад','Да, но только при возврате товара курьером','Да, но без добавления фото и комментария'], ans:1},
        {q:'Как поступить с товаром поставщика, который оказался во вкладке «Товары к утилизации» по истечении срока хранения?', opts:['Отправить товар на склад вместе с возвратами клиентов','Утилизировать товар, предварительно сняв всю маркировку Wildberries с упаковки','Вернуть товар напрямую поставщику','Оставить товар на хранении до следующего приезда поставщика'], ans:1},
        {q:'Что делать при обнаружении брака во время подготовки товара к отправке на склад?', opts:['Продолжить переупаковку товара как обычно','Отменить процесс переупаковки в программе, в разделе «Возврат» во вкладке «Товары» поставить отметку о браке','Проигнорировать брак и отправить товар на склад','Сообщить о браке клиенту и дождаться его решения'], ans:1},
        {q:'Какой тип брака относится к категории «Повреждение текстиля» согласно инструкции?', opts:['Следы клея','Дыры, разрыв шва, порез','Некачественная фурнитура','Просрочка товара'], ans:1},
        {q:'Что из перечисленного НЕ допускается при подготовке товаров к отправке на склад?', opts:['Замена старого читающегося стикера на новый','Перечеркивание старого стикера при необходимости','Использование поврежденной упаковки (открытые, порванные, замотанные скотчем пакеты)','Указание в системе размера сейф-пакета, соответствующего фактическому'], ans:2},
        {q:'Что делать, если срок хранения доставки WB Track истек, заказчик её не забрал, а клиент не оформил возврат?', opts:['Отправить доставку на склад для дальнейшего хранения','Утилизировать доставку','Оставить доставку в ПВЗ до выяснения обстоятельств','Вернуть доставку отправителю за его счет'], ans:1},
        {q:'В какой момент клиент должен создать и оплатить заявку на обратную доставку WB Track?', opts:['После истечения срока хранения доставки','До истечения срока хранения доставки','В день получения доставки получателем','Только после обращения получателя в поддержку'], ans:1},
        {q:'Если у клиента несколько доставок WB Track, как правильно принять их в ПВЗ?', opts:['Принимать каждую доставку по отдельности через раздел «Новый клиент»','Отсканировать QR-код клиента, выбрать нужную заявку из списка, нажать «Оформить эту посылку»','Только через мобильное приложение WB ПВЗ','Отправить клиента в другой ПВЗ, так как прием нескольких доставок запрещен'], ans:1},
        {q:'Как группируются товары поставщика перед выдачей в десктоп-приложении?', opts:['Группируются по одинаковым характеристикам с указанием количества в карточке','Выдаются по одному без группировки','Группируются только по размеру упаковки','Не группируются, каждый товар отображается отдельно'], ans:0},
        {q:'При отказе поставщика от части товаров при выдаче что нужно сделать в программе?', opts:['Отказать поставщику в выдаче всех товаров полностью','Повторно отсканировать стикер товара или снять галочку вручную','Вернуть все товары поставщика на склад','Сообщить о ситуации в техподдержку и дождаться указаний'], ans:1},
        {q:'Как правильно наклеить ШК на сейф-пакет при оформлении доставки WB Track?', opts:['Наклеить ШК на дно пакета','Наклеить ШК в специально отведенное место на сейф-пакете согласно инструкции','Наклеить ШК поверх старого стикера, если он есть','Оставить сейф-пакет без ШК, указав номер вручную'], ans:1},
        {q:'Какие товары запрещены к приему в доставку через сервис WB Track?', opts:['Крупногабаритные товары более 5 кг','Хрупкие товары в ненадлежащей упаковке, оружие, алкоголь, деньги, скоропортящиеся продукты, животные, драгоценности','Только товары с истекшим сроком годности','Товары, стоимость которых превышает 100 000 рублей'], ans:1},
        {q:'Кейс 1. Клиент принес в ПВЗ ресейл-товар для отправки. Он отказывается показать содержимое на камеру. На упаковке следы вскрытия. Ваши действия?', opts:['Принять товар без проверки','Отказать в приеме, объяснив, что содержимое обязательно должно быть показано на камеру','Принять товар, но сделать фото упаковки на свой телефон','Упаковать товар в дополнительный пакет и принять'], ans:1},
        {q:'Кейс 2. При приемке возвращенных товаров от курьера вы обнаружили, что на товаре отсутствует читаемый штрих-код. В списке сканирования этот товар числится. Товар выглядит бракованным. Как правильно оформить приемку?', opts:['Отказаться от приемки всего возврата','Оформить возврат как брак, зафиксировав повреждения в системе без штрих-кода','Попытаться восстановить штрих-код вручную','Принять товар как есть, отметив в комментариях отсутствие ШК'], ans:1},
        {q:'Кейс 3. В конце рабочего дня вы обнаруживаете, что в возвратной коробке лежит сейф-пакет с двумя стикерами: штатным и посторонним. Как исправить ситуацию?', opts:['Оставить как есть, курьер разберется','Снять посторонний стикер, оставив только штатный ШК доставки','Переклеить оба стикера на новое место','Убрать сейф-пакет из коробки и отложить в сторону'], ans:1}
    ];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let questions = shuffle([...rawQuestions]);
    questions = questions.map(q => {
        const optsWithIndex = q.opts.map((text, idx) => ({ text, idx }));
        const shuffledOpts = shuffle([...optsWithIndex]);
        const newOpts = shuffledOpts.map(item => item.text);
        const newAns = shuffledOpts.findIndex(item => item.idx === q.ans);
        return { q: q.q, opts: newOpts, ans: newAns };
    });

    const passThreshold = 20;
    const STORAGE_KEY = 'wb_test_results';

    const motivation = {};
    for(let i=0;i<50;i++) motivation[i] = '🔴 Результат неудовлетворительный. Повторите материал.';
    for(let i=50;i<70;i++) motivation[i] = '🟡 Хороший прогресс, но до зачёта ещё далеко. Повторите материал.';
    for(let i=70;i<85;i++) motivation[i] = '🟢 Почти сдали! Повторите материал.';
    motivation[85] = '🎉 ПОЗДРАВЛЯЮ! Вы сдали тест! 85% — отличный результат!';
    motivation[90] = '🎉 90% — блестящий результат! Вы лучший!';
    motivation[95] = '🎉 95% — вы заслуживаете оваций!';
    motivation[100] = '🎉 ИДЕАЛЬНО! 100%! ВЫ — АБСОЛЮТНЫЙ ЭКСПЕРТ! 🏆✨';

    function getMot(p) {
        const key = Math.round(p);
        return motivation[key] || (p < 85 ? '📖 Рекомендуем повторить регламенты. Повторите материал.' : '🔥 Отличный результат! Так держать!');
    }

    function getResults() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function saveResult(fio, correct, total, pct, status) {
        const results = getResults();
        results[fio] = { fio, correct, total, pct, status, date: new Date().toLocaleString('ru-RU') };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
        sendToGoogleSheets(fio, 'Wildberries', correct, total, pct, status);
    }

    const container = document.getElementById('questions');
    let html = '';
    questions.forEach((q, idx) => {
        const cleanQuestion = q.q.replace(/^\d+\.\s*/, '');
        html += `<div class="question" id="q${idx}">`;
        html += `<div class="question-title"><span class="q-number">${idx+1}.</span> ${cleanQuestion}</div>`;
        html += `<div class="options" id="opts${idx}">`;
        q.opts.forEach((opt, oi) => {
            const cleanOpt = opt.replace(/^[А-Я]\)\s*/, '').replace(/^[A-Z]\)\s*/, '');
            html += `<label id="lbl${idx}_${oi}"><input type="radio" name="q${idx}" value="${oi}"> ${cleanOpt}</label>`;
        });
        html += `</div>`;
        html += `<div class="feedback" id="fb${idx}"></div>`;
        html += `</div>`;
    });
    container.innerHTML = html;

    function updateProgress() {
        const total = questions.length;
        let answered = 0;
        for (let i = 0; i < total; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) answered++;
        }
        const pct = Math.round((answered / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = answered + ' из ' + total;
    }

    document.querySelectorAll('input[type="radio"]').forEach(el => {
        el.addEventListener('change', updateProgress);
    });
    updateProgress();

    document.getElementById('checkBtn').addEventListener('click', function() {
        const fio = document.getElementById('fio').value.trim();
        const errorEl = document.getElementById('userError');
        if (!fio) { errorEl.style.display = 'block'; return; }
        errorEl.style.display = 'none';

        document.getElementById('fioDisplay').textContent = '👤 ' + fio;
        document.getElementById('sendStatus').className = 'send-status';
        document.getElementById('sendStatus').textContent = '⏳ Отправка результата...';
        document.getElementById('sendStatus').style.display = 'inline-block';

        let correct = 0;
        const total = questions.length;
        questions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const qDiv = document.getElementById(`q${idx}`);
            const fb = document.getElementById(`fb${idx}`);
            const labels = document.querySelectorAll(`#opts${idx} label`);
            labels.forEach(l => l.classList.remove('correct-answer','wrong-answer'));
            qDiv.classList.remove('correct','wrong');
            if (selected) {
                const val = parseInt(selected.value);
                if (val === q.ans) {
                    correct++;
                    qDiv.classList.add('correct');
                    fb.className = 'feedback correct';
                    fb.textContent = '✅ Правильно';
                    labels[val].classList.add('correct-answer');
                } else {
                    qDiv.classList.add('wrong');
                    fb.className = 'feedback wrong';
                    fb.textContent = '❌ Неправильно';
                    labels[val].classList.add('wrong-answer');
                }
            } else {
                qDiv.classList.add('wrong');
                fb.className = 'feedback wrong';
                fb.textContent = '❌ Ответ не выбран';
            }
            document.querySelectorAll(`input[name="q${idx}"]`).forEach(el => el.disabled = true);
        });

        const rb = document.getElementById('resultBlock');
        rb.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = correct+' / '+total;
        const pct = Math.round((correct/total)*100);
        document.getElementById('detailDisplay').textContent = pct+'%';
        const ps = document.getElementById('passStatus');
        let status = '';
        if (pct >= 85) {
            ps.className = 'pass-status pass';
            ps.textContent = '✅ ТЕСТ СДАН! Вы молодец!';
            status = 'Сдан';
        } else {
            const need = passThreshold - correct;
            ps.className = 'pass-status fail';
            ps.textContent = '❌ ТЕСТ НЕ СДАН. Не хватает '+need+' правильных ответа(ов) до 85%';
            status = 'Не сдан';
        }
        const motEl = document.getElementById('motivationText');
        motEl.textContent = getMot(pct);
        document.getElementById('checkBtn').disabled = true;
        saveResult(fio, correct, total, pct, status);
        rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => {
            el.checked = false;
            el.disabled = false;
        });
        document.querySelectorAll('.question').forEach(el => el.classList.remove('correct','wrong'));
        document.querySelectorAll('.feedback').forEach(el => { el.textContent = ''; el.className = 'feedback'; });
        document.querySelectorAll('.options label').forEach(el => el.classList.remove('correct-answer','wrong-answer'));
        document.getElementById('resultBlock').style.display = 'none';
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('userError').style.display = 'none';
        document.getElementById('sendStatus').className = 'send-status';
        document.getElementById('sendStatus').textContent = '';
        document.getElementById('sendStatus').style.display = 'none';
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>
</body>
</html>
