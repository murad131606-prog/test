<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест OZON</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #e8ecf1 0%, #d5dce6 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 30px 35px; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.3); position: relative; }
        .btn-home { position: absolute; top: 20px; right: 25px; background: #6c757d; color: #fff; border: none; padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 30px; cursor: pointer; transition: all 0.3s; text-decoration: none; font-family: 'Montserrat', sans-serif; }
        .btn-home:hover { background: #495057; transform: translateY(-2px); }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
        .header .logo { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #005b9e, #0077cc); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .header h1 { font-size: 26px; color: #005b9e; margin: 0; font-weight: 800; }
        .subtitle { text-align: center; font-size: 14px; color: #7a8a9a; margin-bottom: 5px; font-weight: 400; }
        .pass-info { text-align: center; font-size: 15px; color: #1a2a3a; background: #e9edf2; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; }
        .progress-container { background: #e9edf2; border-radius: 20px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #005b9e, #4da6e8); border-radius: 20px; width: 0%; transition: width 0.5s ease; }
        .progress-text { text-align: right; font-size: 13px; color: #7a8a9a; margin-top: -15px; margin-bottom: 15px; font-weight: 600; }
        .user-form { background: #f8f9fc; padding: 18px 20px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; border: 1px solid #e9edf2; }
        .user-form label { font-weight: 700; font-size: 14px; color: #1a2a3a; min-width: 40px; }
        .user-form input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; flex: 1; min-width: 200px; transition: 0.3s; font-family: 'Montserrat', sans-serif; }
        .user-form input:focus { outline: none; border-color: #005b9e; box-shadow: 0 0 0 3px rgba(0,91,158,0.15); }
        .question { background: #f9fbfd; padding: 18px 22px; margin-bottom: 14px; border-radius: 16px; border-left: 5px solid #005b9e; transition: all 0.3s; animation: fadeIn 0.3s ease; }
        .question.correct { border-left-color: #28a745; background: #eafaf1; }
        .question.wrong { border-left-color: #dc3545; background: #fdedec; }
        .question-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; color: #1a2a3a; }
        .question .q-number { color: #7a8a9a; font-weight: 400; font-size: 13px; }
        .options label { display: block; padding: 6px 0 6px 30px; font-size: 14px; cursor: pointer; border-radius: 8px; transition: all 0.15s; position: relative; font-weight: 400; }
        .options label:hover { background: #e9edf2; }
        .options input[type="radio"] { margin-right: 12px; transform: scale(1.1); position: absolute; left: 0; top: 7px; }
        .options input[type="radio"]:disabled { cursor: not-allowed; }
        .options label.correct-answer { background: #d4edda !important; border-radius: 8px; }
        .options label.wrong-answer { background: #f8d7da !important; border-radius: 8px; }
        .feedback { font-weight: 600; font-size: 13px; margin-top: 6px; }
        .feedback.correct { color: #28a745; }
        .feedback.wrong { color: #dc3545; }
        .result-block { margin-top: 25px; padding: 25px; background: #e9f0fa; border-radius: 20px; text-align: center; display: none; }
        .result-block .score { font-size: 34px; font-weight: 900; color: #005b9e; }
        .result-block .detail { font-size: 16px; margin-top: 5px; font-weight: 600; }
        .result-block .pass-status { font-size: 22px; font-weight: 700; margin-top: 8px; padding: 10px; border-radius: 12px; }
        .result-block .pass-status.pass { color: #28a745; background: #d4edda; }
        .result-block .pass-status.fail { color: #dc3545; background: #f8d7da; }
        .result-block .motivation { font-size: 17px; margin-top: 10px; padding: 14px; background: #fff; border-radius: 12px; font-style: italic; color: #1a2a3a; border: 2px dashed #005b9e; font-weight: 500; }
        .result-block .screenshot-note { margin-top: 14px; padding: 14px; background: #fff3cd; border: 2px solid #ffc107; border-radius: 12px; font-size: 16px; font-weight: 700; color: #856404; }
        .result-block .screenshot-note span { font-size: 28px; }
        .btn { background: linear-gradient(135deg, #005b9e, #0077cc); color: #fff; border: none; padding: 14px 25px; font-size: 17px; font-weight: 700; border-radius: 40px; cursor: pointer; transition: all 0.3s; margin-top: 10px; width: 100%; font-family: 'Montserrat', sans-serif; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,91,158,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-reset { background: #6c757d; margin-top: 8px; }
        .btn-reset:hover { background: #495057; box-shadow: 0 8px 25px rgba(108,117,125,0.3); }
        .footer { text-align: center; margin-top: 18px; font-size: 12px; color: #7a8a9a; font-weight: 400; }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 5px; display: none; text-align: center; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .container { padding: 15px; } .user-form { flex-direction: column; } .user-form input { width: 100%; } .btn-home { position: static; display: inline-block; margin-bottom: 15px; } .header { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">🏠 На главную</a>
    <div class="header">
        <div class="logo">O</div>
        <h1>OZON</h1>
    </div>
    <div class="subtitle">20 вопросов · 85%</div>
    <div class="pass-info">✅ Для успешного прохождения необходимо набрать <strong>85%</strong></div>

    <div class="user-form" id="userForm">
        <label>ФИО</label>
        <input type="text" id="fio" placeholder="Иванов Иван Иванович">
    </div>
    <div class="error-msg" id="userError">⚠️ Введите ФИО перед проверкой</div>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 из 20</div>

    <div id="questions"></div>

    <div class="result-block" id="resultBlock">
        <div class="score" id="scoreDisplay">0 / 20</div>
        <div class="detail" id="detailDisplay"></div>
        <div class="pass-status" id="passStatus"></div>
        <div class="motivation" id="motivationText"></div>
        <div class="screenshot-note" id="screenshotNote">
            <span>📸</span> Сделайте скриншот и отправьте руководителю<br>для подтверждения прохождения теста
        </div>
    </div>

    <button class="btn" id="checkBtn">✅ Проверить ответы</button>
    <button class="btn btn-reset" id="resetBtn">🔄 Пройти заново</button>
    <div class="footer">При ошибке правильный вариант не показывается</div>
</div>

<script>
(function() {
    const GOOGLE_SHEETS_URL = 'ВАШ_URL_GOOGLE_SHEETS';

    function sendToGoogleSheets(fio, testName, correct, total, pct, status) {
        const data = {
            fio: fio,
            test: testName,
            result: correct + ' из ' + total,
            percent: pct,
            status: status
        };
        fetch(GOOGLE_SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(err => console.log('Ошибка отправки:', err));
    }

    const rawQuestions = [
        {q:'В течение какого времени необходимо принять перевозку и все постинги, когда приехал курьер?', opts:['В течение 15 минут с момента прибытия','До конца текущего рабочего дня','В течение 2 часов','До конца следующего рабочего дня'], ans:0},
        {q:'Какой правильный алгоритм добавления возвратов?', opts:['Принять и физически добавить в коробку','Отсканировать один раз и добавить в коробку','Выбрать направление «Прямой» или «Возвратный поток», отсканировать товар, если требуется переупаковка — переупаковать и наклеить стикер, отсканировать и добавить системно и физически в коробку','Отдать физически курьеру'], ans:2},
        {q:'Каков правильный алгоритм действий при приеме возврата от клиента?', opts:['Принять товар, вернуть деньги из кассы ПВЗ и оформить документы','Попросить номер заявки, убедиться в одобрении, сверить товар с описанием в системе и оформить возврат','Отправить клиента в службу поддержки Ozon','Принять товар без проверки, чтобы не создавать очередь'], ans:1},
        {q:'Как называется постинг, который не числится в составе перевозки, но при этом предназначен для вашего ПВЗ?', opts:['Недовоз','Излишек','Брак','Пересорт'], ans:1},
        {q:'Менеджер ПВЗ при приеме перевозки насчитал меньше тарных мест, чем заявлено в «Турбо ПВЗ». Что нужно сделать?', opts:['Принять перевозку как есть и закрыть её','Отказаться от всей перевозки','Завершить перевозку с расхождениями вручную, а при обнаружении недостающего места — допринять его','Позвонить водителю и потребовать вернуться'], ans:2},
        {q:'В каком случае нужно зафиксировать повреждение, но НЕ аннулировать постинг в «Турбо ПВЗ»?', opts:['Товар полностью разбит','Незначительная деформация поверхности упаковки или расклеивание коробки по шву','Отсутствует штрихкод на упаковке','Вскрыта заводская упаковка товара'], ans:1},
        {q:'Где менеджер ПВЗ может получить консультацию или задать вопрос по работе точки?', opts:['В личных сообщениях менеджера по развитию в мессенджере','По телефону горячей линии для покупателей','В чате поддержки в «Турбо ПВЗ»','В социальных сетях Ozon'], ans:2},
        {q:'Что происходит при аннуляции постинга в «Турбо ПВЗ» по кнопке «Зафиксировать повреждения»?', opts:['Товар отправляется обратно продавцу','Клиенту возвращаются деньги и приходит уведомление об отмене заказа','Товар списывается с баланса ПВЗ','Продавец получает штраф'], ans:1},
        {q:'Можно ли системно переместить постинг с одной ячейки на другую после его приёма на баланс?', opts:['Нет, это запрещено регламентом','Да, через раздел «Поиск предметов»','Только до завершения приемки перевозки','Только с разрешения старшего менеджера'], ans:0},
        {q:'Во сколько нужно прийти на ПВЗ, чтобы Ozon не выставил штраф в размере 2500 рублей?', opts:['к 10:00','в любое время','к 8:40–9:00','к 9:30'], ans:2},
        {q:'Что делать, если клиент хочет вернуть товар, но у него нет номера заявки на возврат?', opts:['Принять товар и оформить возврат самостоятельно','Отказать в приеме и попросить клиента создать заявку в личном кабинете Ozon','Предложить клиенту обменять товар на другой','Принять товар и вернуть деньги наличными'], ans:1},
        {q:'Как узнать, что сегодня в ПВЗ должна приехать перевозка с заказами?', opts:['Позвонить водителю','Зайти в раздел «Перевозки» в «Турбо ПВЗ» и проверить счетчик перевозок','Дождаться звонка из сортировочного центра','Проверить электронную почту'], ans:1},
        {q:'Клиент при получении заказа утверждает, что товар не заказывал. Ваши действия?', opts:['Выдать заказ, так как он оплачен','Отказать в выдаче и предложить клиенту обратиться в поддержку Ozon','Проверить данные заказа и при наличии сомнений не выдавать товар','Позвонить продавцу для уточнения'], ans:2},
        {q:'Что входит в процесс приёмки заказов от курьера?', opts:['Только проверка количества коробок','Пересчет тарных мест, проверка целостности упаковки и сверка номеров с данными в системе','Приемка без проверки для экономии времени','Только сканирование штрихкодов'], ans:1},
        {q:'Может ли менеджер ПВЗ принимать заказы от других маркетплейсов (например, Яндекс Маркет)?', opts:['Нет, это строго запрещено','Да, но только после согласования с менеджером по развитию Ozon','Да, без каких-либо ограничений','Только если это заказы Wildberries'], ans:0},
        {q:'В течение какого времени должны быть собраны все возвраты?', opts:['В течение рабочей смены, и под конец смены все возвраты должны быть собраны','Можно оставить до следующей смены','Когда приедет курьер','В конце смены'], ans:0},
        {q:'Сколько раз за день можно брать технический перерыв?', opts:['Каждый час по 15 минут, указывая перерыв в «Турбо ПВЗ»; нельзя в первом часу рабочего дня и в конце рабочего дня','В любое время, любой промежуток','Два раза в день','В конце и в начале смены'], ans:0},
        {q:'Каков алгоритм выдачи товара клиенту?', opts:['Клиент показывает товар, и вручную выдать ему','Отсканировать штрихкод из личного кабинета и без сканирования товара выдать','Отсканировать во вкладке «Выдача заказов» штрихкод из личного кабинета, отсканировать товар из ячейки, отметить выдачу и провести оплату','Отсканировать штрихкод и отсканировать товар, без проведения оплаты выдать'], ans:2},
        {q:'Можно ли принимать поставку на другом ПВЗ или выдавать товар (например, Wildberries)?', opts:['Можно только приемку','Категорически нельзя ни приемку, ни выдачу заказов','Можно, если отсканировать штрихкод, но выдать в месте, где находится ПВЗ','Можно только выдачу'], ans:1},
        {q:'За сколько времени нужно принять приемку?', opts:['В течение 2 часов','В течение рабочей смены','В течение 24 часов','Оставить на следующую смену'], ans:0}
    ];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let questions = shuffle([...rawQuestions]);
    questions = questions.map(q => {
        const optsWithIndex = q.opts.map((text, idx) => ({ text, idx }));
        const shuffledOpts = shuffle([...optsWithIndex]);
        const newOpts = shuffledOpts.map(item => item.text);
        const newAns = shuffledOpts.findIndex(item => item.idx === q.ans);
        return { q: q.q, opts: newOpts, ans: newAns };
    });

    const passThreshold = 17;
    const STORAGE_KEY = 'ozon_test_results';

    const motivation = {};
    for(let i=0;i<50;i++) motivation[i] = '🔴 Результат неудовлетворительный. Повторите материал.';
    for(let i=50;i<70;i++) motivation[i] = '🟡 Хороший прогресс, но до зачёта ещё далеко. Повторите материал.';
    for(let i=70;i<85;i++) motivation[i] = '🟢 Почти сдали! Повторите материал.';
    motivation[85] = '🎉 ПОЗДРАВЛЯЮ! Вы сдали тест! 85% — отличный результат!';
    motivation[90] = '🎉 90% — блестящий результат! Вы лучший!';
    motivation[95] = '🎉 95% — вы заслуживаете оваций!';
    motivation[100] = '🎉 ИДЕАЛЬНО! 100%! ВЫ — АБСОЛЮТНЫЙ ЭКСПЕРТ! 🏆✨';

    function getMot(p) {
        const key = Math.round(p);
        return motivation[key] || (p < 85 ? '📖 Рекомендуем повторить регламенты. Повторите материал.' : '🔥 Отличный результат! Так держать!');
    }

    function getResults() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function saveResult(fio, correct, total, pct, status) {
        const results = getResults();
        results[fio] = { fio, correct, total, pct, status, date: new Date().toLocaleString('ru-RU') };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
        sendToGoogleSheets(fio, 'OZON', correct, total, pct, status);
    }

    const container = document.getElementById('questions');
    let html = '';
    questions.forEach((q, idx) => {
        const cleanQuestion = q.q.replace(/^\d+\.\s*/, '');
        html += `<div class="question" id="q${idx}">`;
        html += `<div class="question-title"><span class="q-number">${idx+1}.</span> ${cleanQuestion}</div>`;
        html += `<div class="options" id="opts${idx}">`;
        q.opts.forEach((opt, oi) => {
            const cleanOpt = opt.replace(/^[А-Я]\)\s*/, '').replace(/^[A-Z]\)\s*/, '');
            html += `<label id="lbl${idx}_${oi}"><input type="radio" name="q${idx}" value="${oi}"> ${cleanOpt}</label>`;
        });
        html += `</div>`;
        html += `<div class="feedback" id="fb${idx}"></div>`;
        html += `</div>`;
    });
    container.innerHTML = html;

    function updateProgress() {
        const total = questions.length;
        let answered = 0;
        for (let i = 0; i < total; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) answered++;
        }
        const pct = Math.round((answered / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = answered + ' из ' + total;
    }

    document.querySelectorAll('input[type="radio"]').forEach(el => {
        el.addEventListener('change', updateProgress);
    });
    updateProgress();

    document.getElementById('checkBtn').addEventListener('click', function() {
        const fio = document.getElementById('fio').value.trim();
        const errorEl = document.getElementById('userError');
        if (!fio) { errorEl.style.display = 'block'; return; }
        errorEl.style.display = 'none';

        let correct = 0;
        const total = questions.length;
        questions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const qDiv = document.getElementById(`q${idx}`);
            const fb = document.getElementById(`fb${idx}`);
            const labels = document.querySelectorAll(`#opts${idx} label`);
            labels.forEach(l => l.classList.remove('correct-answer','wrong-answer'));
            qDiv.classList.remove('correct','wrong');
            if (selected) {
                const val = parseInt(selected.value);
                if (val === q.ans) {
                    correct++;
                    qDiv.classList.add('correct');
                    fb.className = 'feedback correct';
                    fb.textContent = '✅ Правильно';
                    labels[val].classList.add('correct-answer');
                } else {
                    qDiv.classList.add('wrong');
                    fb.className = 'feedback wrong';
                    fb.textContent = '❌ Неправильно';
                    labels[val].classList.add('wrong-answer');
                }
            } else {
                qDiv.classList.add('wrong');
                fb.className = 'feedback wrong';
                fb.textContent = '❌ Ответ не выбран';
            }
            document.querySelectorAll(`input[name="q${idx}"]`).forEach(el => el.disabled = true);
        });

        const rb = document.getElementById('resultBlock');
        rb.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = correct+' / '+total;
        const pct = Math.round((correct/total)*100);
        document.getElementById('detailDisplay').textContent = pct+'%';
        const ps = document.getElementById('passStatus');
        let status = '';
        if (pct >= 85) {
            ps.className = 'pass-status pass';
            ps.textContent = '✅ ТЕСТ СДАН! Вы молодец!';
            status = 'Сдан';
        } else {
            const need = passThreshold - correct;
            ps.className = 'pass-status fail';
            ps.textContent = '❌ ТЕСТ НЕ СДАН. Не хватает '+need+' правильных ответа(ов) до 85%';
            status = 'Не сдан';
        }
        const motEl = document.getElementById('motivationText');
        motEl.textContent = getMot(pct);
        motEl.className = pct < 85 ? 'motivation strict' : 'motivation';
        document.getElementById('checkBtn').disabled = true;

        saveResult(fio, correct, total, pct, status);

        rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => {
            el.checked = false;
            el.disabled = false;
        });
        document.querySelectorAll('.question').forEach(el => el.classList.remove('correct','wrong'));
        document.querySelectorAll('.feedback').forEach(el => { el.textContent = ''; el.className = 'feedback'; });
        document.querySelectorAll('.options label').forEach(el => el.classList.remove('correct-answer','wrong-answer'));
        document.getElementById('resultBlock').style.display = 'none';
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('userError').style.display = 'none';
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>
</body>
</html>
