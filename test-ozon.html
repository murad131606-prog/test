        88:'🎉 88% — почти отлично! Гордость для команды!',
        89:'🎉 Вы — звезда этого ПВЗ!',
        90:'🎉 90% — это блестящий результат! Вы лучший!',
        91:'🎉 91% — вы — лучший среди лучших!',
        92:'🎉 Вы не просто знаете — вы понимаете материал!',
        93:'🎉 93% — это уровень эксперта!',
        94:'🎉 Вы — эталон для других сотрудников!',
        95:'🎉 95% — вы заслуживаете оваций!',
        96:'🎉 Ваш мозг работает как суперкомпьютер!',
        97:'🎉 97% — вы почти идеальны!',
        98:'🎉 Вы — легенда! Осталось два процента до максимума!',
        99:'🎉 99% — вы выше всех! Почти бог знаний!',
        100:'🎉 ИДЕАЛЬНО! 100%! ВЫ — АБСОЛЮТНЫЙ ЭКСПЕРТ! 🏆✨'
    };

    function getMot(p) {
        const key = Math.round(p);
        return motivation[key] || (p < 85 ? '📖 Рекомендуем повторить регламенты. Повторите материал.' : '🔥 Отличный результат! Так держать!');
    }

    const container = document.getElementById('questions');
    let html = '';
    questions.forEach((q, idx) => {
        html += '<div class="question" id="q'+idx+'">';
        html += '<div class="question-title">'+q.q+'</div>';
        html += '<div class="options" id="opts'+idx+'">';
        q.opts.forEach((opt, oi) => {
            html += '<label id="lbl'+idx+'_'+oi+'"><input type="radio" name="q'+idx+'" value="'+oi+'"> '+opt+'</label>';
        });
        html += '</div>';
        html += '<div class="feedback" id="fb'+idx+'"></div>';
        html += '</div>';
    });
    container.innerHTML = html;

    document.getElementById('checkBtn').addEventListener('click', function() {
        let correct = 0;
        const total = questions.length;
        questions.forEach((q, idx) => {
            const selected = document.querySelector('input[name="q'+idx+'"]:checked');
            const qDiv = document.getElementById('q'+idx);
            const fb = document.getElementById('fb'+idx);
            const labels = document.querySelectorAll('#opts'+idx+' label');
            labels.forEach(l => l.classList.remove('correct-answer','wrong-answer'));
            qDiv.classList.remove('correct','wrong');
            if (selected) {
                const val = parseInt(selected.value);
                if (val === q.ans) {
                    correct++;
                    qDiv.classList.add('correct');
                    fb.className = 'feedback correct';
                    fb.textContent = '✅ Правильно';
                    labels[val].classList.add('correct-answer');
                } else {
                    qDiv.classList.add('wrong');
                    fb.className = 'feedback wrong';
                    fb.textContent = '❌ Неправильно';
                    labels[val].classList.add('wrong-answer');
                }
            } else {
                qDiv.classList.add('wrong');
                fb.className = 'feedback wrong';
                fb.textContent = '❌ Ответ не выбран';
            }
            document.querySelectorAll('input[name="q'+idx+'"]').forEach(el => el.disabled = true);
        });
        const rb = document.getElementById('resultBlock');
        rb.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = correct+' / '+total;
        const pct = Math.round((correct/total)*100);
        document.getElementById('detailDisplay').textContent = pct+'%';
        const ps = document.getElementById('passStatus');
        if (pct >= 85) {
            ps.className = 'pass-status pass';
            ps.textContent = '✅ ТЕСТ СДАН! Вы молодец!';
        } else {
            const need = passThreshold - correct;
            ps.className = 'pass-status fail';
            ps.textContent = '❌ ТЕСТ НЕ СДАН. Не хватает '+need+' правильных ответа(ов) до 85%';
        }
        const motEl = document.getElementById('motivationText');
        motEl.textContent = getMot(pct);
        motEl.className = pct < 85 ? 'motivation strict' : 'motivation';
        document.getElementById('checkBtn').disabled = true;
        rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => {
            el.checked = false;
            el.disabled = false;
        });
        document.querySelectorAll('.question').forEach(el => el.classList.remove('correct','wrong'));
        document.querySelectorAll('.feedback').forEach(el => { el.textContent = ''; el.className = 'feedback'; });
        document.querySelectorAll('.options label').forEach(el => el.classList.remove('correct-answer','wrong-answer'));
        document.getElementById('resultBlock').style.display = 'none';
        document.getElementById('checkBtn').disabled = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>
</body>
</html>
