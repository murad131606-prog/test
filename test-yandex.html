<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Яндекс Маркет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a1040 45%, #2d1b69 100%);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px 44px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            border-radius: 100%;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header .logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(145deg, #e53935, #b71c1c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
        }
        .header .badge {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 4px;
            font-weight: 400;
        }
        .pass-info {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-weight: 400;
        }
        .pass-info strong {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }
        .user-form {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .user-form label {
            font-weight: 500;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 36px;
        }
        .user-form input {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            transition: 0.3s;
        }
        .user-form input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .user-form input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 4px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .progress-container {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            height: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e53935, #ff7a5a);
            border-radius: 20px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: -14px;
            margin-bottom: 16px;
            font-weight: 400;
        }
        .question {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 22px;
            margin-bottom: 14px;
            border-radius: 16px;
            border-left: 3px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }
        .question.correct {
            border-left-color: #28a745;
            background: rgba(40, 167, 69, 0.06);
        }
        .question.wrong {
            border-left-color: #dc3545;
            background: rgba(220, 53, 69, 0.06);
        }
        .question-title {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
        }
        .question .q-number {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
            font-size: 13px;
        }
        .options label {
            display: block;
            padding: 6px 0 6px 30px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s;
            position: relative;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
        }
        .options label:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .options input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.1);
            position: absolute;
            left: 0;
            top: 7px;
            accent-color: #e53935;
        }
        .options input[type="radio"]:disabled {
            cursor: not-allowed;
        }
        .options label.correct-answer {
            background: rgba(40, 167, 69, 0.12) !important;
            border-radius: 8px;
            color: #28a745;
        }
        .options label.wrong-answer {
            background: rgba(220, 53, 69, 0.12) !important;
            border-radius: 8px;
            color: #dc3545;
        }
        .feedback {
            font-weight: 500;
            font-size: 13px;
            margin-top: 6px;
        }
        .feedback.correct {
            color: #28a745;
        }
        .feedback.wrong {
            color: #dc3545;
        }
        .result-block {
            margin-top: 28px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
        }
        .fio-display {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 10px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: inline-block;
        }
        .result-block .score {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
        }
        .result-block .detail {
            font-size: 16px;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        .result-block .pass-status {
            font-size: 20px;
            font-weight: 600;
            margin-top: 10px;
            padding: 10px;
            border-radius: 12px;
        }
        .result-block .pass-status.pass {
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }
        .result-block .pass-status.fail {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }
        .result-block .motivation {
            font-size: 16px;
            margin-top: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-weight: 400;
        }
        .result-block .send-status {
            font-size: 14px;
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }
        .result-block .send-status.success {
            color: #28a745;
            background: rgba(40, 167, 69, 0.08);
            display: inline-block;
        }
        .result-block .send-status.error {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.08);
            display: inline-block;
        }
        .result-block .screenshot-note {
            margin-top: 16px;
            padding: 14px;
            background: rgba(255, 193, 7, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #ffc107;
        }
        .result-block .screenshot-note span {
            font-size: 24px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            min-width: 180px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Inter', sans-serif;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(145deg, #e53935, #b71c1c);
            color: #ffffff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 57, 53, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateY(-2px);
        }
        .btn-home {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 0.5;
            min-width: 120px;
        }
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .container { padding: 20px 18px; border-radius: 24px; }
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header h1 { font-size: 20px; }
            .user-form { flex-direction: column; align-items: stretch; }
            .user-form input { width: 100%; }
            .btn-group { flex-direction: column; }
            .btn { min-width: unset; }
            .btn-home { flex: 1; }
            .question { padding: 14px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="logo">Я</div>
            <h1>Яндекс Маркет</h1>
        </div>
        <span class="badge">Тестирование</span>
    </div>
    <div class="subtitle">20 вопросов · 85% для прохождения</div>
    <div class="pass-info">Для успешного прохождения необходимо набрать <strong>85%</strong></div>

    <div class="user-form" id="userForm">
        <label>ФИО</label>
        <input type="text" id="fio" placeholder="Иванов Иван Иванович">
    </div>
    <div class="error-msg" id="userError">⚠️ Введите ФИО перед проверкой</div>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 из 20</div>

    <div id="questions"></div>

    <div class="result-block" id="resultBlock">
        <div class="fio-display" id="fioDisplay"></div>
        <div class="score" id="scoreDisplay">0 / 20</div>
        <div class="detail" id="detailDisplay"></div>
        <div class="pass-status" id="passStatus"></div>
        <div class="motivation" id="motivationText"></div>
        <div class="send-status" id="sendStatus"></div>
        <div class="screenshot-note" id="screenshotNote">
            <span>📸</span> Сделайте скриншот и отправьте руководителю<br>для подтверждения прохождения теста
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="checkBtn">✅ Проверить ответы</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 Пройти заново</button>
        <a href="index.html" class="btn btn-home">🏠 На главную</a>
    </div>
    <div class="footer">При ошибке правильный вариант не показывается</div>
</div>

<script>
(function() {
    const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyhMhW5eaVjFVWUb1Q9eFyhmXWfty_q4UF3HTFaW7f7OsfLGYiVXVYfHppO-eJXHzhIXg/exec';

    function sendToGoogleSheets(fio, testName, correct, total, pct, status) {
        const data = { fio, test: testName, result: correct + ' из ' + total, percent: pct, status };
        console.log('📤 Отправка данных в Google Sheets:', data);
        fetch(GOOGLE_SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            console.log('✅ Запрос отправлен (no-cors)');
            document.getElementById('sendStatus').textContent = '✅ Результат отправлен в таблицу!';
            document.getElementById('sendStatus').className = 'send-status success';
        })
        .catch(error => {
            console.error('❌ Ошибка отправки:', error);
            document.getElementById('sendStatus').textContent = '❌ Ошибка отправки. Проверьте интернет.';
            document.getElementById('sendStatus').className = 'send-status error';
        });
    }

    const rawQuestions = [
        {q:'Какие товары категорически запрещены к приёму на ПВЗ?', opts:['Товары с истекшим сроком годности и просроченные продукты','Взрывчатые вещества, оружие, наркотики, деньги, живые организмы, скоропортящиеся продукты','Только крупногабаритные товары и тяжёлые грузы','Только драгоценности, антиквариат и предметы искусства'], ans:1},
        {q:'Что нужно сделать при выдаче предоплаченного заказа?', opts:['Отсканировать ШК клиента, проверить ячейку, передать заказ, клиент проверяет под камерами, нажать «Выдать»','Сразу отдать заказ без проверки после сканирования ШК','Попросить клиента расписаться в журнале и отдать заказ','Отправить клиента в поддержку для подтверждения заказа'], ans:0},
        {q:'Что нужно сделать при приёмке товаров у курьера Маркета?', opts:['Отсканировать ШК заказа, QR курьера, ШК всех посылок, нажать «Завершить», разместить заказы на складе','Только пересчитать коробки и подписать акт','Принять все посылки без сканирования для экономии времени','Сразу отправить товары в ячейку отгрузки Drop'], ans:0},
        {q:'Что делать при проверке товара на возврат, если упаковка повреждена?', opts:['Принять возврат, если повреждение не влияет на товарный вид или комплектность','Отказать в возврате при любых повреждениях упаковки','Принять товар, но снизить сумму возврата на 50%','Отправить клиента в службу поддержки для оформления акта'], ans:0},
        {q:'Как правильно проверить товар при возврате?', opts:['Проверить упаковку, состояние товара, отсутствие следов эксплуатации, комплектацию, бирки','Только посмотреть на внешний вид упаковки и сверить номер заказа','Только сверить серийный номер с накладной','Принять всё, что принёс клиент, без проверки'], ans:0},
        {q:'Что делать при отгрузке заказов курьеру Маркета?', opts:['Отсканировать QR курьера, отсканировать все грузоместа, нажать «Завершить отгрузку», сверить расхождения','Просто отдать коробки курьеру и подписать акт','Отправить товары без сканирования и подписать документы позже','Отсканировать только часть грузомест для ускорения процесса'], ans:0},
        {q:'Как правильно собирать лот для отгрузки?', opts:['Тяжёлые заказы вниз, лёгкие наверх, учитывать манипуляционные знаки, крупногабаритные россыпью','Складывать все заказы в одну кучу без учёта веса и габаритов','Сначала лёгкие, потом тяжёлые, чтобы не повредить хрупкие товары','Все заказы отгружать россыпью без использования лотов'], ans:0},
        {q:'Что делать, если при приёмке возврата клиент не может найти номер заявки?', opts:['Попросить клиента создать заявку в приложении или отказать в приёме','Принять товар без заявки и оформить возврат самостоятельно','Вернуть деньги из кассы ПВЗ без оформления документов','Принять товар и отправить клиента в поддержку'], ans:0},
        {q:'Какую информацию нужно проверить при приёмке заказа Авито?', opts:['Наличие документа у клиента, соответствие фото и содержимого, отсутствие запрещённых предметов','Только внешний вид упаковки и вес посылки','Только серийный номер товара на коробке','Только паспортные данные клиента'], ans:0},
        {q:'Что делать при работе с товарами, требующими специального температурного режима?', opts:['Не принимать, так как требуют специальных условий перевозки','Принять, если упаковка выглядит надёжной','Упаковать в дополнительную термоизоляцию и принять','Отправить с обычными товарами, если срок годности позволяет'], ans:0},
        {q:'Какие товары относятся к категории «легковоспламеняющиеся жидкости»?', opts:['Бензин, ацетон, растворители, керосин','Масло, маргарин, сметана и другие жиры','Шампуни, гели, кремы и косметика','Вода, соки, чай и безалкогольные напитки'], ans:0},
        {q:'Что делать, если клиент хочет примерить заказ с оплатой на ПВЗ?', opts:['Передать клиенту заказы для примерки, остальные осматривает под камерами, спросить, что забирает, удалить отказы, провести оплату, нажать «Выдать»','Отдать все заказы без проверки и без примерки','Запретить примерку, так как заказы уже оплачены','Отправить клиента в примерочную и ждать, пока он выберет'], ans:0},
        {q:'При приёмке возврата что делать с бракованным товаром?', opts:['Принять как возврат, упаковать в транспортную упаковку, распечатать этикетку, положить в ячейку отгрузки Drop','Выбросить бракованный товар в мусорный контейнер','Вернуть клиенту бракованный товар и оформить отказ','Отправить в общую коробку с другими возвратами без маркировки'], ans:0},
        {q:'Что делать, если у клиента нет кода из СМС при получении заказа?', opts:['Нажать «Отправить код», попросить клиента продиктовать код, ввести его в систему','Выдать заказ без кода, если клиент показывает паспорт','Отказать в выдаче заказа до получения кода','Отправить клиента в службу поддержки за новым кодом'], ans:0},
        {q:'Как правильно оформить возврат заказа в системе?', opts:['Вкладка «Приёмка», отсканировать QR-код из приложения клиента, проверить возврат, принять или отказаться, упаковать, распечатать и наклеить этикетку, положить в ячейку отгрузки Drop','Просто отдать клиенту деньги и выбросить товар','Отправить товар обратно продавцу без оформления документов','Принять товар и оставить его на складе до следующей смены'], ans:0},
        {q:'Что делать, если при приёмке заказа от курьера обнаружено расхождение по количеству мест?', opts:['Завершить приёмку с расхождениями, составить акт, допринять недостающее при обнаружении','Отказаться от всей перевозки и отправить курьера обратно','Принять перевозку как есть и закрыть её без комментариев','Позвонить водителю и потребовать вернуться с недостающими местами'], ans:0},
        {q:'Как правильно поступить с заказом, если клиент не забирает его в срок хранения?', opts:['Вернуть заказ на склад или в сортировочный центр по истечении срока хранения','Утилизировать заказ, если срок хранения истёк','Оставить заказ на ПВЗ до следующего приезда клиента','Передать заказ другому клиенту, если он подходит по размеру'], ans:0},
        {q:'Что нужно сделать при приёмке возврата от клиента, если товар выглядит б/у?', opts:['Отказать в возврате, так как есть следы эксплуатации, и предложить оформить претензию','Принять возврат и упаковать как обычный товар','Принять возврат, но снизить сумму возврата вручную','Отправить клиента в поддержку для оформления возврата'], ans:0},
        {q:'Какие документы должен проверить менеджер при выдаче заказа по паспорту?', opts:['ФИО получателя, серию и номер паспорта, срок действия документа, фотографию владельца','Только фамилию получателя','Только номер паспорта без проверки ФИО','Только срок действия документа'], ans:0},
        {q:'Что делать, если при приёмке заказа Авито клиент не может предъявить документ из списка допустимых?', opts:['Отказать в приёме заказа, так как без документа приёмка невозможна','Принять заказ, если клиент называет номер заказа по памяти','Принять заказ и попросить клиента прислать фото документа позже','Отправить клиента в поддержку для подтверждения личности'], ans:0}
    ];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let questions = shuffle([...rawQuestions]);
    questions = questions.map(q => {
        const optsWithIndex = q.opts.map((text, idx) => ({ text, idx }));
        const shuffledOpts = shuffle([...optsWithIndex]);
        const newOpts = shuffledOpts.map(item => item.text);
        const newAns = shuffledOpts.findIndex(item => item.idx === q.ans);
        return { q: q.q, opts: newOpts, ans: newAns };
    });

    const passThreshold = 17;
    const STORAGE_KEY = 'yandex_test_results';

    const motivation = {};
    for(let i=0;i<50;i++) motivation[i] = '🔴 Результат неудовлетворительный. Повторите материал.';
    for(let i=50;i<70;i++) motivation[i] = '🟡 Хороший прогресс, но до зачёта ещё далеко. Повторите материал.';
    for(let i=70;i<85;i++) motivation[i] = '🟢 Почти сдали! Повторите материал.';
    motivation[85] = '🎉 ПОЗДРАВЛЯЮ! Вы сдали тест! 85% — отличный результат!';
    motivation[90] = '🎉 90% — блестящий результат! Вы лучший!';
    motivation[95] = '🎉 95% — вы заслуживаете оваций!';
    motivation[100] = '🎉 ИДЕАЛЬНО! 100%! ВЫ — АБСОЛЮТНЫЙ ЭКСПЕРТ! 🏆✨';

    function getMot(p) {
        const key = Math.round(p);
        return motivation[key] || (p < 85 ? '📖 Рекомендуем повторить регламенты. Повторите материал.' : '🔥 Отличный результат! Так держать!');
    }

    function getResults() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function saveResult(fio, correct, total, pct, status) {
        const results = getResults();
        results[fio] = { fio, correct, total, pct, status, date: new Date().toLocaleString('ru-RU') };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
        sendToGoogleSheets(fio, 'Яндекс Маркет', correct, total, pct, status);
    }

    const container = document.getElementById('questions');
    let html = '';
    questions.forEach((q, idx) => {
        const cleanQuestion = q.q.replace(/^\d+\.\s*/, '');
        html += `<div class="question" id="q${idx}">`;
        html += `<div class="question-title"><span class="q-number">${idx+1}.</span> ${cleanQuestion}</div>`;
        html += `<div class="options" id="opts${idx}">`;
        q.opts.forEach((opt, oi) => {
            const cleanOpt = opt.replace(/^[А-Я]\)\s*/, '').replace(/^[A-Z]\)\s*/, '');
            html += `<label id="lbl${idx}_${oi}"><input type="radio" name="q${idx}" value="${oi}"> ${cleanOpt}</label>`;
        });
        html += `</div>`;
        html += `<div class="feedback" id="fb${idx}"></div>`;
        html += `</div>`;
    });
    container.innerHTML = html;

    function updateProgress() {
        const total = questions.length;
        let answered = 0;
        for (let i = 0; i < total; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) answered++;
        }
        const pct = Math.round((answered / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = answered + ' из ' + total;
    }

    document.querySelectorAll('input[type="radio"]').forEach(el => {
        el.addEventListener('change', updateProgress);
    });
    updateProgress();

    document.getElementById('checkBtn').addEventListener('click', function() {
        const fio = document.getElementById('fio').value.trim();
        const errorEl = document.getElementById('userError');
        if (!fio) { errorEl.style.display = 'block'; return; }
        errorEl.style.display = 'none';

        document.getElementById('fioDisplay').textContent = '👤 ' + fio;
        document.getElementById('sendStatus').className = 'send-status';
        document.getElementById('sendStatus').textContent = '⏳ Отправка результата...';
        document.getElementById('sendStatus').style.display = 'inline-block';

        let correct = 0;
        const total = questions.length;
        questions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const qDiv = document.getElementById(`q${idx}`);
            const fb = document.getElementById(`fb${idx}`);
            const labels = document.querySelectorAll(`#opts${idx} label`);
            labels.forEach(l => l.classList.remove('correct-answer','wrong-answer'));
            qDiv.classList.remove('correct','wrong');
            if (selected) {
                const val = parseInt(selected.value);
                if (val === q.ans) {
                    correct++;
                    qDiv.classList.add('correct');
                    fb.className = 'feedback correct';
                    fb.textContent = '✅ Правильно';
                    labels[val].classList.add('correct-answer');
                } else {
                    qDiv.classList.add('wrong');
                    fb.className = 'feedback wrong';
                    fb.textContent = '❌ Неправильно';
                    labels[val].classList.add('wrong-answer');
                }
            } else {
                qDiv.classList.add('wrong');
                fb.className = 'feedback wrong';
                fb.textContent = '❌ Ответ не выбран';
            }
            document.querySelectorAll(`input[name="q${idx}"]`).forEach(el => el.disabled = true);
        });

        const rb = document.getElementById('resultBlock');
        rb.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = correct+' / '+total;
        const pct = Math.round((correct/total)*100);
        document.getElementById('detailDisplay').textContent = pct+'%';
        const ps = document.getElementById('passStatus');
        let status = '';
        if (pct >= 85) {
            ps.className = 'pass-status pass';
            ps.textContent = '✅ ТЕСТ СДАН! Вы молодец!';
            status = 'Сдан';
        } else {
            const need = passThreshold - correct;
            ps.className = 'pass-status fail';
            ps.textContent = '❌ ТЕСТ НЕ СДАН. Не хватает '+need+' правильных ответа(ов) до 85%';
            status = 'Не сдан';
        }
        const motEl = document.getElementById('motivationText');
        motEl.textContent = getMot(pct);
        document.getElementById('checkBtn').disabled = true;
        saveResult(fio, correct, total, pct, status);
        rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.querySelectorAll('input[type="radio"]').forEach(el => {
            el.checked = false;
            el.disabled = false;
        });
        document.querySelectorAll('.question').forEach(el => el.classList.remove('correct','wrong'));
        document.querySelectorAll('.feedback').forEach(el => { el.textContent = ''; el.className = 'feedback'; });
        document.querySelectorAll('.options label').forEach(el => el.classList.remove('correct-answer','wrong-answer'));
        document.getElementById('resultBlock').style.display = 'none';
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('userError').style.display = 'none';
        document.getElementById('sendStatus').className = 'send-status';
        document.getElementById('sendStatus').textContent = '';
        document.getElementById('sendStatus').style.display = 'none';
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>
</body>
</html>
